# ~/.config/hypr/hyprtoolkit.conf
# macOS-like dark: soft contrast, teal accent, SF Pro
# Format: 0xAARRGGBB

background = 0xCC141416
base = 0xFF1C1C1E
alternate_base = 0xFF242426

text = 0xFFEDEDED
bright_text = 0xFFFFFFFF

accent = 0xFF00D7C7
accent_secondary = 0xFF0A84FF

# Apple fonts installed
font_family = SF Pro Display
font_family_monospace = SF Mono

# Typography (tight, mac-like)
h1_size = 20
h2_size = 16
h3_size = 13
font_size = 12
small_font_size = 11

# Rounded “pill” feel
rounding_large = 18
rounding_small = 12

# Optional: set explicitly if you use a known icon theme name
icon_theme = WhiteSur
