general {
    lock_cmd = pidof hyprlock || hyprlock              # Start hyprlock only if it is not already running.
    before_sleep_cmd = loginctl lock-session           # Lock the session before any system sleep event.
    after_sleep_cmd = hyprctl dispatch dpms on         # Force monitors on again after wake from sleep.
    ignore_dbus_inhibit = false                        # Respect idle inhibitors from apps like video players.
}

listener {
    timeout = 180                                      # Wait 3 minutes of inactivity.
    on-timeout = brightnessctl -sd rgb:kbd_backlight set 0   # Turn keyboard backlight off.
    on-resume = brightnessctl -rd rgb:kbd_backlight          # Restore previous keyboard backlight level.
}

listener {
    timeout = 300                                      # Wait 5 minutes of inactivity.
    on-timeout = pidof hyprlock || hyprlock            # Lock the session.
}

listener {
    timeout = 360                                      # Wait 6 minutes of inactivity.
    on-timeout = hyprctl dispatch dpms off             # Turn monitor outputs off with DPMS.
    on-resume = hyprctl dispatch dpms on               # Turn monitor outputs back on on input activity.
}
